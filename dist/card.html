<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Card — นนท์ &amp; เมย์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" crossorigin src="./assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/card-CDapg6UD.css">
</head>
<body class="card-page">
  <div class="card-viewport">
    <div class="card-canvas">
      <div class="card-floral-top">
        <svg width="500" height="160" viewBox="0 0 500 160" fill="none">
          <path d="M250 160 Q245 110 220 80" stroke="#B8E8D8" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M250 160 Q255 105 280 75" stroke="#C9B8E8" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M250 160 Q250 100 250 55" stroke="#F9C8D4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M232 115 Q210 95 198 105 Q208 120 232 115Z" fill="#B8E8D8" opacity="0.7"/>
          <path d="M268 110 Q290 90 302 102 Q290 117 268 110Z" fill="#C9B8E8" opacity="0.7"/>
          <circle cx="220" cy="75" r="5" fill="#F9C8D4" opacity="0.85"/>
          <circle cx="220" cy="75" r="10" fill="#F9C8D4" opacity="0.3"/>
          <circle cx="280" cy="70" r="5" fill="#C9B8E8" opacity="0.85"/>
          <circle cx="280" cy="70" r="10" fill="#C9B8E8" opacity="0.3"/>
          <circle cx="250" cy="50" r="6" fill="#F8D8B8" opacity="0.85"/>
          <circle cx="250" cy="50" r="12" fill="#F8D8B8" opacity="0.3"/>
        </svg>
      </div>
      <p class="card-badge">Wedding Invitation</p>
      <h1 class="card-names">นนท์<span class="ampersand">&amp;</span>เมย์</h1>
      <div class="card-divider"></div>
      <p class="card-date">วันเสาร์ที่ 15 มีนาคม พ.ศ. 2570</p>
      <p class="card-tagline">You are cordially invited</p>
      <div class="card-floral-bottom">
        <svg width="400" height="120" viewBox="0 0 400 120" fill="none">
          <path d="M200 10 Q195 55 178 75" stroke="#B8E8D8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M200 10 Q205 52 222 72" stroke="#C9B8E8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M178 75 Q158 60 152 70 Q164 82 178 75Z" fill="#B8E8D8" opacity="0.65"/>
          <path d="M222 72 Q242 58 248 68 Q236 80 222 72Z" fill="#C9B8E8" opacity="0.65"/>
          <circle cx="178" cy="76" r="4" fill="#F9C8D4" opacity="0.8"/>
          <circle cx="222" cy="73" r="4" fill="#F8D8B8" opacity="0.8"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="share-btn-wrapper">
    <button class="btn-share" id="share-btn">บันทึก / แชร์การ์ด</button>
  </div>
</body>
</html>
