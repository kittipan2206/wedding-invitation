<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>นนท์ &amp; เมย์ — Live Guestbook</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap"
        rel="stylesheet" />
    <script type="module" src="/src/js/display.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-pink: #F9C8D4;
            --color-lavender: #C9B8E8;
            --color-text: #2e2a28;
            --color-muted: #8A7F7A;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --border-glass: 1.5px solid rgba(255, 255, 255, 0.9);
            --shadow-card: 0 4px 36px rgba(0, 0, 0, 0.06);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'DM Sans', system-ui, sans-serif;
            --radius-lg: 20px;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Background ── */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #fff8fa, #fdf0ff, #f0f8ff, #f0fff8, #fffaf0, #fff8fa);
            background-size: 400% 400%;
            animation: gradientShift 22s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            75% {
                background-position: 0% 100%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ── Petals ── */
        .petal {
            position: fixed;
            border-radius: 50% 0 50% 0;
            opacity: 0.22;
            animation: petalFall linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }

            8% {
                opacity: 0.22;
            }

            92% {
                opacity: 0.12;
            }

            100% {
                transform: translateY(110vh) rotate(400deg);
                opacity: 0;
            }
        }

        /* ── Page layout ── */
        .display-wrap {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: clamp(16px, 3.5vh, 52px) clamp(16px, 5vw, 96px);
            gap: clamp(12px, 2.2vh, 32px);
        }

        /* ── Header ── */
        .display-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .display-couple {
            font-family: var(--font-serif);
            font-size: clamp(28px, 3.6vw, 58px);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.01em;
        }

        .display-couple span {
            display: inline-block;
            margin: 0 8px;
            opacity: 0.38;
            font-style: normal;
            font-size: 0.72em;
        }

        .display-badge {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 22px;
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 999px;
            border: var(--border-glass);
            box-shadow: var(--shadow-card);
            font-size: clamp(13px, 1.2vw, 18px);
            color: var(--color-muted);
        }

        .live-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #e57373;
            flex-shrink: 0;
            animation: livePulse 1.8s ease-in-out infinite;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.65);
            }
        }

        /* ── Feed grid ── */
        .display-feed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(12px, 1.6vw, 24px);
            align-content: center;
        }

        @media (max-width: 700px) {
            .display-feed {
                grid-template-columns: 1fr;
                gap: 10px;
                align-content: start;
                overflow-y: auto;
                overscroll-behavior: contain;
            }
        }

        @media (min-width: 701px) and (max-width: 1024px) {
            .display-feed {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Page transitions */
        .display-feed.feed--exit {
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.32s ease, transform 0.32s ease;
        }

        @keyframes feedEnter {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .display-feed.feed--enter {
            animation: feedEnter 0.5s var(--ease-out) both;
        }

        /* ── Card ── */
        .display-card {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: clamp(14px, 1.6vw, 22px);
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-lg);
            border: var(--border-glass);
            box-shadow: var(--shadow-card);
            padding: clamp(18px, 2.2vw, 34px) clamp(20px, 2.5vw, 40px);
            overflow: hidden;
        }

        .display-card--new {
            animation: cardIn 0.55s var(--ease-out) both;
            border-color: rgba(201, 184, 232, 0.7);
            box-shadow: 0 4px 48px rgba(201, 184, 232, 0.45), var(--shadow-card);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(-18px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-badge {
            position: absolute;
            top: 12px;
            right: 14px;
            background: linear-gradient(135deg, var(--color-pink), var(--color-lavender));
            color: #fff;
            font-size: clamp(10px, 0.75vw, 13px);
            font-weight: 600;
            letter-spacing: 0.07em;
            padding: 3px 11px;
            border-radius: 999px;
            white-space: nowrap;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.12);
        }

        .display-avatar {
            flex-shrink: 0;
            width: clamp(44px, 4.2vw, 68px);
            height: clamp(44px, 4.2vw, 68px);
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-pink), var(--color-lavender));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 1.8vw, 28px);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .display-card-body {
            flex: 1;
            min-width: 0;
        }

        .display-card-name {
            font-size: clamp(15px, 1.5vw, 24px);
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .display-card-msg {
            font-size: clamp(13px, 1.25vw, 21px);
            color: var(--color-muted);
            line-height: 1.65;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Footer ── */
        .display-footer {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }

        .display-subtitle {
            font-family: var(--font-serif);
            font-size: clamp(13px, 1.3vw, 20px);
            font-style: italic;
            color: var(--color-muted);
            opacity: 0.65;
        }

        .display-pages {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .page-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(138, 127, 122, 0.3);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .page-dot--active {
            background: var(--color-lavender);
            transform: scale(1.35);
        }

        .display-updated {
            font-size: clamp(12px, 1vw, 16px);
            color: var(--color-muted);
            opacity: 0.55;
            text-align: right;
        }

        /* ── Nav buttons ── */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.14);
            border: 1.5px solid rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            width: clamp(44px, 4vw, 68px);
            height: clamp(44px, 4vw, 68px);
            font-size: clamp(22px, 2.4vw, 38px);
            color: var(--color-muted);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s ease, transform 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            user-select: none;
        }

        .nav-btn--prev {
            left: clamp(12px, 2vw, 28px);
        }

        .nav-btn--next {
            right: clamp(12px, 2vw, 28px);
        }

        body:hover .nav-btn {
            opacity: 0.5;
        }

        .nav-btn:hover {
            opacity: 1 !important;
            background: rgba(255, 255, 255, 0.38);
        }

        /* Always visible on touch devices */
        @media (hover: none) {
            .nav-btn {
                opacity: 0.45;
                width: clamp(40px, 11vw, 56px);
                height: clamp(40px, 11vw, 56px);
                font-size: clamp(20px, 6vw, 32px);
            }

            .nav-btn--prev {
                left: 6px;
            }

            .nav-btn--next {
                right: 6px;
            }
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.88);
        }

        .nav-btn:disabled {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* ── Mobile header ── */
        @media (max-width: 700px) {
            .display-couple {
                font-size: clamp(22px, 6vw, 36px);
            }

            .display-badge {
                font-size: 12px;
                padding: 6px 14px;
                gap: 6px;
            }

            .display-card {
                padding: 14px 16px;
                gap: 12px;
            }

            .display-card-msg {
                -webkit-line-clamp: 4;
                line-clamp: 4;
            }

            .display-footer {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
            }

            .display-subtitle {
                grid-column: 1 / -1;
                text-align: center;
                font-size: 13px;
            }

            .display-updated {
                display: none;
            }
        }

        /* ── Empty state ── */
        .display-empty {
            grid-column: 1 / -1;
            font-family: var(--font-serif);
            font-size: clamp(20px, 2.5vw, 36px);
            font-style: italic;
            color: var(--color-muted);
            opacity: 0.45;
            text-align: center;
            padding: 60px 0;
        }
    </style>
</head>

<body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <button class="nav-btn nav-btn--prev" id="nav-prev" aria-label="หน้าก่อนหน้า">&#8249;</button>
    <button class="nav-btn nav-btn--next" id="nav-next" aria-label="หน้าถัดไป">&#8250;</button>

    <div class="display-wrap">
        <header class="display-header">
            <h1 class="display-couple">นนท์ <span>&</span> เมย์</h1>
            <div class="display-badge">
                <div class="live-dot" aria-hidden="true"></div>
                <span>Guestbook Live</span>
            </div>
        </header>

        <main id="display-feed" class="display-feed">
            <p class="display-empty">กำลังโหลดคำอวยพร…</p>
        </main>

        <footer class="display-footer">
            <p class="display-subtitle">ฝากคำอวยพรให้นนท์ &amp; เมย์</p>
            <div id="display-pages" class="display-pages"></div>
            <p id="display-updated" class="display-updated"></p>
        </footer>
    </div>
</body>

</html>
