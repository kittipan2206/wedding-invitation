<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>นนท์ &amp; เมย์ — ช่วงเวลาพิเศษ</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap"
        rel="stylesheet" />
    <script type="module" src="/src/js/gallery.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-pink: #F9C8D4;
            --color-lavender: #C9B8E8;
            --color-text: #2e2a28;
            --color-muted: #8A7F7A;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --border-glass: 1.5px solid rgba(255, 255, 255, 0.9);
            --shadow-card: 0 4px 36px rgba(0, 0, 0, 0.06);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'DM Sans', system-ui, sans-serif;
            --radius-md: 14px;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        html,
        body {
            min-height: 100%;
            font-family: var(--font-sans);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, #fff8fa 0%, #fdf0ff 40%, #f0f8ff 70%, #fff8fa 100%);
        }

        /* ── Page wrap ── */
        .gallery-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(28px, 5vw, 60px) clamp(20px, 5vw, 60px) 80px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-page.is-ready {
            opacity: 1;
        }

        /* ── Header ── */
        .gallery-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: clamp(28px, 4vw, 48px);
            flex-wrap: wrap;
            gap: 12px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--color-muted);
            text-decoration: none;
            padding: 7px 16px;
            border-radius: 999px;
            border: 1.5px solid rgba(201, 184, 232, 0.35);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            transition: border-color 0.2s, color 0.2s;
        }

        .back-link:hover {
            color: var(--color-text);
            border-color: var(--color-lavender);
        }

        .gallery-page-title {
            font-family: var(--font-serif);
            font-size: clamp(26px, 4vw, 44px);
            font-weight: 400;
            font-style: italic;
            color: var(--color-text);
        }

        /* ── Filter tabs ── */
        .gallery-filters {
            display: flex;
            gap: 8px;
            margin-bottom: clamp(20px, 3vw, 36px);
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            padding: 7px 20px;
            border-radius: 999px;
            border: 1.5px solid rgba(201, 184, 232, 0.4);
            background: transparent;
            color: var(--color-muted);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--color-lavender);
            color: var(--color-text);
        }

        .filter-btn.filter--active {
            background: linear-gradient(135deg, var(--color-pink), var(--color-lavender));
            border-color: transparent;
            color: #fff;
        }

        /* ── Masonry grid ── */
        .gallery-masonry {
            columns: 3;
            column-gap: clamp(10px, 1.5vw, 18px);
        }

        @media (max-width: 720px) {
            .gallery-masonry {
                columns: 2;
            }
        }

        @media (max-width: 420px) {
            .gallery-masonry {
                columns: 1;
            }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: clamp(10px, 1.5vw, 18px);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: var(--glass-bg);
            box-shadow: var(--shadow-card);
            transition: transform 0.25s var(--ease-out), box-shadow 0.25s ease;
        }

        .gallery-item:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: var(--radius-md);
            transition: opacity 0.3s ease;
        }

        .gallery-item img.loading {
            opacity: 0;
        }

        .gallery-item-overlay {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            background: linear-gradient(to top, rgba(46, 42, 40, 0.45) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.25s ease;
            display: flex;
            align-items: flex-end;
            padding: 14px 16px;
        }

        .gallery-item:hover .gallery-item-overlay {
            opacity: 1;
        }

        .gallery-item-caption {
            font-size: 13px;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }

        /* ── Loading / Empty ── */
        .gallery-status {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            font-family: var(--font-serif);
            font-size: clamp(18px, 2.5vw, 26px);
            font-style: italic;
            color: var(--color-muted);
            opacity: 0.55;
        }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(20, 18, 18, 0.92);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.lightbox--open {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 22px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            border-radius: 50%;
            width: clamp(40px, 5vw, 56px);
            height: clamp(40px, 5vw, 56px);
            color: #fff;
            font-size: clamp(22px, 3vw, 32px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            z-index: 10;
            line-height: 1;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-nav:disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        .lightbox-prev {
            left: clamp(12px, 3vw, 28px);
        }

        .lightbox-next {
            right: clamp(12px, 3vw, 28px);
        }

        .lightbox-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: min(90vw, 900px);
            max-height: 90vh;
            gap: 14px;
        }

        #lightbox-img {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .lightbox-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.75);
        }

        #lightbox-caption {
            font-size: 14px;
            font-style: italic;
            font-family: var(--font-serif);
        }

        #lightbox-counter {
            font-size: 12px;
            opacity: 0.55;
            white-space: nowrap;
        }

        /* ── Page loader ── */
        #page-loader {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: linear-gradient(135deg, #fff8fa 0%, #fdf0ff 50%, #f0f8ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #page-loader.loader--hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-title {
            font-family: var(--font-serif);
            font-size: clamp(26px, 5vw, 40px);
            font-weight: 400;
            font-style: italic;
            color: var(--color-text);
            letter-spacing: 0.01em;
        }

        .loader-sub {
            font-size: 13px;
            color: var(--color-muted);
            letter-spacing: 0.08em;
        }

        .loader-petals {
            display: flex;
            gap: 10px;
            margin-bottom: 4px;
        }

        .loader-petal {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-pink);
            animation: loaderBounce 1.1s ease-in-out infinite;
        }

        .loader-petal:nth-child(2) {
            background: var(--color-lavender);
            animation-delay: 0.18s;
        }

        .loader-petal:nth-child(3) {
            background: #b8d8f8;
            animation-delay: 0.36s;
        }

        @keyframes loaderBounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            40% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Page loader -->
    <div id="page-loader">
        <div class="loader-petals">
            <div class="loader-petal"></div>
            <div class="loader-petal"></div>
            <div class="loader-petal"></div>
        </div>
        <p class="loader-title">นนท์ &amp; เมย์</p>
        <p class="loader-sub">กำลังโหลดรูปภาพ…</p>
    </div>

    <div class="gallery-page">
        <header class="gallery-page-header">
            <a class="back-link" href="/">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 5l-7 7 7 7" />
                </svg>
                กลับ
            </a>
            <h1 class="gallery-page-title">ช่วงเวลาพิเศษ</h1>
            <div style="width:80px"></div><!-- spacer for centering -->
        </header>

        <div class="gallery-filters">
            <button class="filter-btn filter--active" data-filter="all">ทั้งหมด</button>
            <button class="filter-btn" data-filter="pre-wedding">Pre-wedding</button>
            <button class="filter-btn" data-filter="wedding">วันงาน</button>
        </div>

        <div id="gallery-grid" class="gallery-masonry">
            <p class="gallery-status">กำลังโหลดรูปภาพ…</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="ดูรูปภาพ">
        <button id="lightbox-close" class="lightbox-close" aria-label="ปิด">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="รูปก่อนหน้า">&#8249;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="" />
            <div class="lightbox-meta">
                <p id="lightbox-caption"></p>
                <span id="lightbox-counter"></span>
            </div>
        </div>
        <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="รูปถัดไป">&#8250;</button>
    </div>
</body>

</html>
